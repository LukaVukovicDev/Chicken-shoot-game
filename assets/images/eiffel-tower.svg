        <path d="M89 282 H171" stroke="url(#towerSteel)" stroke-width="14"/>
        <path d="M69 402 H191" stroke="url(#towerSteel)" stroke-width="16"/>
        <path d="M48 502 H212" stroke="url(#towerSteel)" stroke-width="18"/>
        <path d="M103 176 L156 282 M157 176 L104 282 M86 282 L188 402 M174 282 L72 402 M70 402 L108 502 M190 402 L152 502" stroke="#314249" stroke-width="8" opacity="0.95"/>
        <path d="M122 48 H138 M116 77 H144 M109 132 H151 M100 222 H160 M86 338 H174 M61 455 H199" stroke="url(#towerGlow)" stroke-width="4" filter="url(#softGlow)" opacity="0.92"/>
    </g>
