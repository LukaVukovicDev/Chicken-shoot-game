<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 520" role="img" aria-label="Eiffel Tower silhouette">
    <defs>
        <linearGradient id="towerSteel" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#243238"/>
            <stop offset="0.55" stop-color="#162126"/>
            <stop offset="1" stop-color="#0d171a"/>
        </linearGradient>
        <linearGradient id="towerGlow" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#ffe38a" stop-opacity="0.9"/>
            <stop offset="1" stop-color="#f2846b" stop-opacity="0.2"/>
        </linearGradient>
        <filter id="softGlow" x="-40%" y="-20%" width="180%" height="140%">
            <feGaussianBlur stdDeviation="7" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M130 18 L96 474" stroke="url(#towerSteel)" stroke-width="14"/>
